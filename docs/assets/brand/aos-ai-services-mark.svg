  </defs>
  <!-- AI orbit around the A -->
  <ellipse cx="50" cy="56" rx="46" ry="17" fill="none" stroke="url(#aos-orbit)" stroke-width="3" transform="rotate(-16 50 56)"/>
  <polygon points="50,10 12,92 28,92 50,44" fill="#0A2342"/>
  <polygon points="50,10 88,92 72,92 50,44" fill="url(#aos-grad)"/>
  <polygon points="41,64 59,64 64,76 36,76" fill="#8B6BFF"/>
  <circle cx="93" cy="43" r="5" fill="#8B6BFF"/>
  <circle cx="93" cy="43" r="2" fill="#FFFFFF"/>
