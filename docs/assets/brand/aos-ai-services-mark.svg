<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="AOS AI Services mark">
  <defs>
    <linearGradient id="aos-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B6BFF"/>
      <stop offset="1" stop-color="#38D6FF"/>
    </linearGradient>
    <linearGradient id="aos-orbit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8B6BFF" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#8B6BFF"/>
